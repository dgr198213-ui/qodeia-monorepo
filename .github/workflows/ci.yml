name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

# Cancela ejecuciones anteriores del mismo PR/branch para ahorrar minutos
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # Cache local de Turborepo (sustituye al antiguo workflow turbo-cache.yml)
      - name: Cache Turborepo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      # --frozen-lockfile: el CI debe fallar si el lockfile no coincide con los
      # package.json. Barrera deliberada contra cambios de dependencias no
      # revisados (humanos o agentes).
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # agent-core reincorporado al pipeline (Fase 2 completada: 0 errores TS,
      # 96/96 tests en verde). TODO(arch): @qodeia/arch sigue excluido con
      # `--filter=!@qodeia/arch` — 22 errores TS, app heredada pendiente de
      # reubicar (Fase 3; ver README y CLAUDE.md).
      - name: Lint
        run: pnpm lint --filter=!@qodeia/arch

      - name: Typecheck
        run: pnpm typecheck --filter=!@qodeia/arch

      - name: Test
        run: pnpm test --filter=!@qodeia/arch

      - name: Build
        run: pnpm build --filter=!@qodeia/arch
