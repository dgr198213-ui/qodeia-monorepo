name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

# Cancela ejecuciones anteriores del mismo PR/branch para ahorrar minutos
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # Cache local de Turborepo (sustituye al antiguo workflow turbo-cache.yml)
      - name: Cache Turborepo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      # --frozen-lockfile: el CI debe fallar si el lockfile no coincide con los
      # package.json. Barrera deliberada contra cambios de dependencias no
      # revisados (humanos o agentes).
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # TODO(agent-core, arch): @qodeia/agent-core y @qodeia/arch están excluidos
      # temporalmente del pipeline. agent-core: 36 errores TS y 60 tests fallando por
      # migración incompleta (SDK `ai` v4, Supabase sin tipar). arch: 22 errores TS,
      # tipar). Retirar los filtros `--filter=!@qodeia/agent-core --filter=!@qodeia/arch` cuando se
      # completen las Fases 2-3 del plan de consolidación (ver README).
      - name: Lint
        run: pnpm lint --filter=!@qodeia/agent-core --filter=!@qodeia/arch

      - name: Typecheck
        run: pnpm typecheck --filter=!@qodeia/agent-core --filter=!@qodeia/arch

      - name: Test
        run: pnpm test --filter=!@qodeia/agent-core --filter=!@qodeia/arch

      - name: Build
        run: pnpm build --filter=!@qodeia/agent-core --filter=!@qodeia/arch
