name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

# Cancela ejecuciones anteriores del mismo PR/branch para ahorrar minutos
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # Cache local de Turborepo (sustituye al antiguo workflow turbo-cache.yml)
      - name: Cache Turborepo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      # --frozen-lockfile: el CI debe fallar si el lockfile no coincide con los
      # package.json. Barrera deliberada contra cambios de dependencias no
      # revisados (humanos o agentes).
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Pipeline completo: todos los paquetes incluidos (Fase 3C).
      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
